version: "3.9"

services:
  mysql:
    image: mysql:8
    container_name: betalent_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: betalent
      MYSQL_USER: adonis
      MYSQL_PASSWORD: adonis
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: